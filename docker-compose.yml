services:
  scheduler:
    build:
      context: .
      dockerfile: Scheduler/Dockerfile
    environment:
      DATABASE_PATH: /data/peoplewelcome.db
      CORS_ORIGINS: http://localhost:13000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      UNSTOPPABLE_LLM_URL: ${UNSTOPPABLE_LLM_URL:-}
      UNSTOPPABLE_LLM_API_KEY: ${UNSTOPPABLE_LLM_API_KEY:-}
      UNSTOPPABLE_MAX_TOKENS: ${UNSTOPPABLE_MAX_TOKENS:-2048}
      UNSTOPPABLE_TIMEOUT_SECONDS: ${UNSTOPPABLE_TIMEOUT_SECONDS:-300}
      UNSTOPPABLE_HISTORY_MAX_CHARS: ${UNSTOPPABLE_HISTORY_MAX_CHARS:-32000}
      IMAGE_GENERATOR_URL: http://image-generator:8001
      MEDIA_ROOT: /data/media
    volumes:
      - peoplewelcome-data:/data
    ports:
      - "18000:8000"
  web:
    build:
      context: .
      dockerfile: WebClient/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:18000
    depends_on:
      - scheduler
    ports:
      - "13000:80"
  image-generator:
    build:
      context: .
      dockerfile: ImageGenerator/Dockerfile
    environment:
      DIFFUSERS_MODEL_ID: ${DIFFUSERS_MODEL_ID:-stable-diffusion-v1-5/stable-diffusion-v1-5}
      IMAGE_GENERATION_SIZE: ${IMAGE_GENERATION_SIZE:-512}
      HF_HOME: /data/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - peoplewelcome-data:/data
    gpus: all
    restart: unless-stopped
volumes:
  peoplewelcome-data:
